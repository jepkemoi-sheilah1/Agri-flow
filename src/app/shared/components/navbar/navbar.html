<nav class="navbar">

  <!-- Logo -->
  <a routerLink="/buyer" class="brand">
    <div class="brand-icon">
      <mat-icon>eco</mat-icon>
    </div>
    <span class="brand-name">AgriFlow</span>
  </a>

  <!-- Right side -->
  <div class="nav-right">

    @if (user$) {
      <div class="user-info">
        <span class="user-name">{{ user$?.firstName }}</span>
        <span class="role-badge">{{ user$?.roles?.[0] }}</span>
      </div>
    }

    <button mat-icon-button (click)="logout()" title="Logout">
      <mat-icon>logout</mat-icon>
    </button>

  </div>

</nav>

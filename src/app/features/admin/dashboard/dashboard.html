<app-dashboard-layout>

  <div class="welcome-section">
    <h1>Welcome, {{ user?.username }} 👋</h1>
    <p>Manage sellers and platform activity</p>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <mat-card class="stat-card" routerLink="/admin/businesses">
      <mat-card-content>
        <div class="stat-icon orange">
          <mat-icon>pending_actions</mat-icon>
        </div>
        <div class="stat-info">
          <span class="stat-number">{{ pendingCount }}</span>
          <span class="stat-label">Pending Approvals</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon green">
          <mat-icon>verified</mat-icon>
        </div>
        <div class="stat-info">
          <span class="stat-number">{{ verifiedCount }}</span>
          <span class="stat-label">Active Sellers</span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <!-- Quick action -->
  <mat-card class="action-card">
    <mat-card-content>
      <div class="action-inner">
        <div class="action-icon">
          <mat-icon>business</mat-icon>
        </div>
        <div class="action-text">
          <h3>Business Approvals</h3>
          <p>Review and approve pending seller registrations</p>
        </div>
        <button mat-flat-button routerLink="/admin/businesses" class="action-btn">
          Review Now
        </button>
      </div>
    </mat-card-content>
  </mat-card>

</app-dashboard-layout>
